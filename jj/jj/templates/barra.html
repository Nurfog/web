<!DOCTYPE html>
<html>

<head>
    <title>J&J</title>
    <meta charset="utf-8">
    {% load bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}     
</head>

<style>
    body 
    {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    header 
        {
            background-color: #333;
            color: #fff;
            padding: 10px;
        }

    nav ul 
        {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: center;
            background-color: #333;
        }

    nav li 
        {
            display: inline; /* Hace que los ítems del menú estén en una línea horizontal */
            margin-right: 20px; /* Espacio entre los ítems del menú */
        }

    nav a 
        {
            text-decoration: none;
            color: #fff;
            font-size: 20px;

        }

    nav a:hover 
        {
            text-decoration: underline;
        }

</style>


<body>
    <nav>
        <ul>
            <li><a href="localhost:8000">Home</a></li>
            <li><a href="https://norteamericano.cl">Blog</a></li>
            <li>Contacto</li>
        </ul>
    </nav>
</body>

</html>
